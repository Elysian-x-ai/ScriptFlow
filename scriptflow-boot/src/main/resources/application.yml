# =============================================
# ScriptFlow Application Configuration
# =============================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: scriptflow

  # Datasource (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3307/scriptflow?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        retry:
          enabled: true
          max-attempts: 3

  # File upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.scriptflow.dal.entity

# Sa-Token (authentication)
sa-token:
  token-name: Authorization
  timeout: 2592000  # 30 days
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-login: true
  is-read-cookie: false
  is-read-head: true
  is-write-header: true

# Knife4j / Swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan:
    - com.scriptflow.system.controller
    - com.scriptflow.project.controller
    - com.scriptflow.task.controller
    - com.scriptflow.prompt.controller
    - com.scriptflow.export.controller
    - com.scriptflow.storage.controller

# =============================================
# ScriptFlow Custom Properties
# =============================================

scriptflow:
  # AI microservice
  ai:
    base-url: http://localhost:8000
    connect-timeout: 10
    read-timeout: 120
    write-timeout: 60
    max-retries: 3
    api-key: scriptflow-dev-key

  # File storage
  storage:
    type: minio
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: scriptflow
    region: cn-east-1

  # RabbitMQ queue names
  rabbit:
    queue:
      task: scriptflow.task.submit
      result: scriptflow.task.result
      log: scriptflow.task.log
